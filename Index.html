<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Maria Firmina</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <h1>Maria Firmina</h1>

  <div class="biografia">
    <p id="resumo" class="txt_bio"></p>

    <!-- Botão começa desabilitado até o fetch terminar -->
    <button id="btn-saiba-mais" onclick="abrirModal()" type="button" disabled class="button">
      <u>Saiba mais</u>
    </button>
  </div>

  <h2>Obras</h2>
  <p>Confira as obras de Maria Firmina:</p>


  <div class="obras">

    <ul>
      <li class="livro">
        <a href="livros/paginas/ursula.html">
          <img src="assets/capas/ursula.png" alt="Úrsula" class="capa" />
          <div class="sinopse">
            <h3 class="titulo_obra">Úrsula</h3>
            <p id="sinopse-ursula" class="txt_sinopse"></p>
          </div>
        </a>
      </li>

      <li class="livro">
        <a href="livros/paginas/escrava.html">
          <img src="assets/capas/a-escrava.png" alt="A Escrava" class="capa" />
        </a>
      </li>

      <li class="livro">
        <a href="livros/paginas/gupeva.html">
          <img src="assets/capas/gupeva.png" alt="Gupeva" class="capa" />
        </a>
      </li>

      <li class="livro">
        <a href="livros/paginas/cantos.html">
          <img src="assets/capas/cantos.png" alt="Cantos a Beira-Mar" class="capa" />
        </a>
      </li>
    </ul>
  </div>

  <!-- modal começa none (invisível) -->
  <div id="modal" style="display: none">
    <div>
      <p id="texto-completo"></p>
      <!-- texto preenchido via JS -->
      <button onclick="fecharModal()">Fechar</button>
      <!-- botao que fecha o modal -->
    </div>
  </div>

  <script src="script.js"></script>
</body>

</html>
