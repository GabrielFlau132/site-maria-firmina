<!doctype html>
<html lang="en">
  <!-- ============ HEAD ============ -->
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Maria Firmina</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <!-- ============ TEMPLATE (MODAL LIVRO) ============ -->
  <template id="template-modal-livro">
    <div class="modal-livro">
      <div class="modal-content-livro">
        <div class="livro-layout">
          <div class="col-esquerda">
            <img class="livro-capa" />
          </div>

          <div class="col-direita">
            <h2 class="livro-titulo"></h2>
            <div class="livro-sinopse"></div>
            <div class="livro-resumo"></div>
            <div class="livro-info"></div>
            <a class="livro-download" target="_blank">Download do PDF</a>
          </div>
        </div>
      </div>
    </div>
  </template>

  <!-- ============ BODY ============ -->
  <body>
    <!-- ============ BACKGROUND / WRAPPER ============ -->
    <div class="bg-wrapper">
      <div class="bg-pattern-top"></div>

      <div class="bg-firmina-wrapper">
        <img src="assets/firmina.png" class="bg-firmina" />
      </div>

      <div class="bg-pattern-bottom"></div>

      <!-- ============ CONTEÚDO PRINCIPAL ============ -->
      <div class="conteudo">
        <h1>Maria Firmina</h1>

        <!-- ============ BIOGRAFIA ============ -->
        <div class="biografia">
          <p id="resumo" class="txt_bio"></p>

          <!-- Botão começa desabilitado até o fetch terminar -->
          <button
            id="btn-saiba-mais"
            onclick="abrirModal()"
            type="button"
            disabled
            class="button"
          >
            <u>Saiba mais</u>
          </button>
        </div>

        <!-- ============ OBRAS ============ -->
        <h2>Obras</h2>
        <p>Confira as obras de Maria Firmina:</p>

        <div class="obras">
          <ul>
            <!-- ================= LIVRO: ÚRSULA ================= -->
            <li class="container-livro">
              <a
                onclick="
                  abrirModalLivro(
                    'template-modal-livro',
                    'main-modal',
                    'ursula-object',
                  )
                "
              >
                <img src="assets/capas/ursula.png" alt="Úrsula" class="capa" />
                <div class="sinopse">
                  <h3 class="titulo_obra">Úrsula</h3>
                  <p id="sinopse-ursula" class="txt_sinopse"></p>
                </div>
              </a>
            </li>

            <!-- ================= LIVRO: A ESCRAVA ================= -->
            <li class="container-livro">
              <a
                onclick="
                  abrirModalLivro(
                    'template-modal-livro',
                    'main-modal',
                    'escrava-object',
                  )
                "
              >
                <img
                  src="assets/capas/a-escrava.png"
                  alt="A Escrava"
                  class="capa"
                />
                <div class="sinopse">
                  <h3 class="titulo_obra">A Escrava</h3>
                  <p id="sinopse-escrava" class="txt_sinopse"></p>
                </div>
              </a>
            </li>

            <!-- ================= LIVRO: GUPEVA ================= -->
            <li class="container-livro">
              <a
                onclick="
                  abrirModalLivro(
                    'template-modal-livro',
                    'main-modal',
                    'gupeva-object',
                  )
                "
              >
                <img src="assets/capas/gupeva.png" alt="Gupeva" class="capa" />
                <div class="sinopse">
                  <h3 class="titulo_obra">Gupeva</h3>
                  <p id="sinopse-gupeva" class="txt_sinopse"></p>
                </div>
              </a>
            </li>

            <!-- ================= LIVRO: CANTOS ================= -->
            <li class="container-livro">
              <a
                onclick="
                  abrirModalLivro(
                    'template-modal-livro',
                    'main-modal',
                    'cantos-object',
                  )
                "
              >
                <img
                  src="assets/capas/cantos.png"
                  alt="Cantos a Beira-Mar"
                  class="capa"
                />
                <div class="sinopse">
                  <h3 class="titulo_obra">Cantos a Beira-Mar</h3>
                  <p id="sinopse-cantos" classa="txt_sinopse"></p>
                </div>
              </a>
            </li>
          </ul>
        </div>

        <!-- ============ MODAL (BIOGRAFIA) ============ -->
        <div id="modal" class="modal">
          <div>
            <p id="texto-completo"></p>
            <!-- texto preenchido via JS -->
            <button onclick="fecharModal()">Fechar</button>
            <!-- botao que fecha o modal -->
          </div>
        </div>
      </div>
    </div>

    <!-- ============ CONTAINER MODAL DINÂMICO ============ -->
    <div id="main-modal"></div>

    <!-- ============ SCRIPT ============ -->
    <script src="script.js"></script>
  </body>
</html>
