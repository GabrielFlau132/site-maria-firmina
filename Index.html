<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Maria Firmina</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <div class="bg-wrapper">
    <div class="bg-pattern-top"></div>

    <div class="bg-firmina-wrapper">
      <img src="assets/firmina.png" class="bg-firmina" />
    </div>

    <div class="bg-pattern-bottom"></div>

    <div class="conteudo">
      <h1>Maria Firmina</h1>

      <div class="biografia">
        <p id="resumo" class="txt_bio"></p>

        <!-- Botão começa desabilitado até o fetch terminar -->
        <button id="btn-saiba-mais" onclick="abrirModal()" type="button" disabled class="button">
          <u>Saiba mais</u>
        </button>
      </div>

      <h2>Obras</h2>
      <p>Confira as obras de Maria Firmina:</p>

      <div class="obras">
        <ul>
          <li class="container-livro">
            <a href="livros/paginas/ursula.html">
              <img src="assets/capas/ursula.png" alt="Úrsula" class="capa" />
              <div class="sinopse">
                <h3 class="titulo_obra">Úrsula</h3>
                <p id="sinopse-ursula" class="txt_sinopse"></p>
              </div>
            </a>
          </li>

          <li class="container-livro">
            <a href="livros/paginas/escrava.html">
              <img src="assets/capas/a-escrava.png" alt="A Escrava" class="capa" />
              <div class="sinopse">
                <h3 class="titulo_obra">A Escrava</h3>
                <p id="sinopse-escrava" class="txt_sinopse"></p>
              </div>
            </a>
          </li>

          <li class="container-livro">
            <a href="livros/paginas/gupeva.html">
              <img src="assets/capas/gupeva.png" alt="Gupeva" class="capa" />
              <div class="sinopse">
                <h3 class="titulo_obra">Gupeva</h3>
                <p id="sinopse-gupeva" class="txt_sinopse"></p>
              </div>
            </a>
          </li>

          <li class="container-livro">
            <a href="livros/paginas/cantos.html">
              <img src="assets/capas/cantos.png" alt="Cantos a Beira-Mar" class="capa" />
              <div class="sinopse">
                <h3 class="titulo_obra">Cantos a Beira-Mar</h3>
                <p id="sinopse-cantos" class="txt_sinopse"></p>
              </div>
            </a>
          </li>
        </ul>
      </div>

      <!-- modal começa none (invisível) -->
      <div id="modal" class="modal">
        <div>
          <p id="texto-completo"></p>
          <!-- texto preenchido via JS -->
          <button onclick="fecharModal()">Fechar</button>
          <!-- botao que fecha o modal -->
        </div>
      </div>

    </div>
  </div>

  <div id="main modal"></div>

  <script src="script.js"></script>

</body>

</html>
